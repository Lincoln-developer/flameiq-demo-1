name: Performance Regression Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FlameIQ
        run: pip install flameiq-core

      # Restore the baseline that was saved on the last main push.
      # PRs will find this cache and compare against it.
      # restore-keys is a fallback in case no exact key match exists.
      - name: Restore baseline cache
        uses: actions/cache@v4
        with:
          path: .flameiq/
          key: flameiq-baseline-${{ github.base_ref || 'main' }}
          restore-keys: flameiq-baseline-

      # ── MAIN BRANCH ───────────────────────────────────────────────
      # On pushes to main, benchmark the FAST (correct) implementation
      # and store it as the reference baseline for all future PRs.

      - name: Run fast benchmarks
        if: github.ref == 'refs/heads/main'
        run: python benchmarks/step2_produce_metrics.py

      - name: Validate fast metrics
        if: github.ref == 'refs/heads/main'
        run: flameiq validate benchmark.json

      - name: Set baseline
        if: github.ref == 'refs/heads/main'
        run: flameiq baseline set --metrics benchmark.json

      # ── PULL REQUESTS ─────────────────────────────────────────────
      # On PRs, benchmark the REGRESSED implementation and compare
      # it against the baseline set on main.
      # If any metric exceeds its threshold, the job exits 1 and
      # blocks the PR from merging.

      - name: Run regressed benchmarks
        if: github.event_name == 'pull_request'
        run: python benchmarks/step4_produce_regressed_metrics.py

      - name: Validate current metrics
        if: github.event_name == 'pull_request'
        run: flameiq validate current.json

      - name: Compare against baseline
        if: github.event_name == 'pull_request'
        run: flameiq compare --metrics current.json --fail-on-regression

      # ── ALWAYS ────────────────────────────────────────────────────
      # Generate an HTML report and upload it as a CI artifact on
      # every run — including failed ones. You need the report most
      # when a regression IS detected, not only when everything passes.

      - name: Generate performance report
        if: always()
        run: |
          METRICS_FILE=$( [ "${{ github.event_name }}" = "pull_request" ] \
            && echo "current.json" || echo "benchmark.json" )
          flameiq report --metrics $METRICS_FILE --output report.html

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flameiq-report-${{ github.run_number }}
          path: report.html
          retention-days: 30
